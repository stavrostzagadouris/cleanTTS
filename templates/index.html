<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cleanTTS</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f232c;
      --text: #e8eaed;
      --muted: #8a93a3;
      --accent: #5ea1ff;
      --accent-strong: #2f7bff;
      --danger: #e0485f;
      --warn: #f0a020;
      --user: #2f7bff;
      --assistant: #2a2f3a;
      --ok: #4ec9b0;
      --border: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .app {
      width: 100%;
      max-width: 760px;
      display: grid;
      gap: 16px;
    }
    h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.2px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 8px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    select, input[type=text], input[type=number], button, textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }
    textarea { font-family: inherit; resize: vertical; }
    button {
      cursor: pointer;
      background: var(--accent-strong);
      color: white;
      border: none;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.ghost { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    button.danger { background: var(--danger); }
    button.danger:hover:not(:disabled) { background: #f25d72; }

    .chat {
      height: 320px;
      overflow-y: auto;
      padding: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 14px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user { background: var(--user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.assistant { background: var(--assistant); align-self: flex-start; border-bottom-left-radius: 4px; }
    .reasoning { color: var(--muted); font-style: italic; font-size: 12px; display: block; margin-bottom: 6px; }

    .conv-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-top: 12px; }
    .conv-btn {
      width: auto;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 500;
      flex-shrink: 0;
      min-width: 180px;
    }
    #ptt { min-width: 150px; }

    .status-wrap { display: flex; align-items: center; flex: 1; min-width: 0; }
    .state-dot {
      display: inline-block;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted); margin-right: 8px;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .state-dot.listening { background: var(--ok); animation: pulse-dot 1.4s infinite; }
    .state-dot.processing { background: var(--warn); }
    .state-dot.speaking { background: var(--accent); }
    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0   rgba(78, 201, 176, 0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(78, 201, 176, 0);   }
      100% { box-shadow: 0 0 0 0   rgba(78, 201, 176, 0);   }
    }

    .status { color: var(--muted); font-size: 13px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }

    h2 { margin: 0 0 8px; font-size: 16px; }
    .test-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }

    code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>cleanTTS</h1>
      <div class="sub">Local voice assistant — Whisper + Kokoro + remote LLM. External tools can call <code>POST /v1/audio/speech</code>.</div>
    </header>

    <section class="panel">
      <div class="row" style="margin-bottom: 12px;">
        <div>
          <label for="llm-backend">LLM server</label>
          <select id="llm-backend"><option>Loading…</option></select>
        </div>
        <div>
          <label for="llm-model">LLM model</label>
          <select id="llm-model"><option>Loading…</option></select>
        </div>
      </div>

      <div class="row" style="grid-template-columns: 1fr; margin-bottom: 12px;">
        <div>
          <label for="voice">Voice</label>
          <select id="voice"><option>Loading…</option></select>
        </div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="conv-row">
        <button id="conv" class="conv-btn" type="button">Start conversation</button>
        <button id="ptt" class="conv-btn ghost" type="button">Push to talk</button>
        <div class="status-wrap">
          <span id="state-dot" class="state-dot"></span>
          <span id="status" class="status">Click Start to begin.</span>
        </div>
        <button id="reset" class="ghost" style="width: auto;">New chat</button>
      </div>
    </section>

    <section class="panel">
      <h2>Test TTS API</h2>
      <div class="sub">Same endpoint your external tools should hit: <code>POST /v1/audio/speech</code></div>
      <div class="row" style="margin-bottom: 10px;">
        <div>
          <label for="test-voice">Voice</label>
          <select id="test-voice"><option>Loading…</option></select>
        </div>
        <div>
          <label for="test-speed">Speed</label>
          <input id="test-speed" type="number" step="0.1" min="0.25" max="4.0" value="1.0" />
        </div>
      </div>
      <div class="test-row">
        <textarea id="test-text" rows="2" placeholder="Type something to speak…">Third place, two seconds behind the leader. Keep pushing.</textarea>
        <button id="test-speak" style="width: auto; align-self: stretch;">Speak</button>
      </div>
      <div id="test-status" class="status" style="margin-top: 8px;"></div>
    </section>
  </div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web/dist/bundle.min.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  const chat = $('chat');
  const status = $('status');
  const stateDot = $('state-dot');
  const llmBackend = $('llm-backend');
  const llmModel = $('llm-model');
  const voiceSel = $('voice');
  const testVoice = $('test-voice');
  const convBtn = $('conv');
  const pttBtn = $('ptt');
  const resetBtn = $('reset');
  const testBtn = $('test-speak');
  const testText = $('test-text');
  const testSpeed = $('test-speed');
  const testStatus = $('test-status');

  // ---- state machine ----------------------------------------------------
  const S = { IDLE: 'idle', LISTENING: 'listening', PROCESSING: 'processing', SPEAKING: 'speaking' };
  let appState = S.IDLE;
  // Top-level input mode: 'idle' = no mic, 'conv' = VAD conversation,
  // 'ptt' = push-to-talk (mutually exclusive with conv).
  let mode = 'idle';

  // ---- VAD --------------------------------------------------------------
  let myVAD = null;
  let vadLoading = false;
  // Sustained-speech threshold before a real interrupt commits. Stops short
  // noises (coughs, "uh huh", speaker bleed past AEC) from cutting off TTS.
  const BARGE_IN_HOLD_MS = 1000;
  let bargeInTimer = null;

  // ---- PTT --------------------------------------------------------------
  let pttRecorder = null;
  let pttStream = null;
  let pttChunks = [];
  let pttRecording = false;

  // ---- audio playback ---------------------------------------------------
  const audioQueue = [];
  let currentAudio = null;
  let isPlaying = false;
  // Cooldown: ignore VAD speech-start for ~200ms after each TTS chunk begins,
  // so the start of our own assistant's voice doesn't trip a barge-in via
  // speaker bleed (browser AEC is the primary defense; this is belt+braces).
  let bargeIneligibleUntil = 0;

  // ---- LLM streaming flag ----------------------------------------------
  let llmStreaming = false;

  // ---- WebSocket --------------------------------------------------------
  let ws;
  let currentAssistantMsg = null;

  // -----------------------------------------------------------------------

  function setStatus(text, kind = '') {
    status.textContent = text;
    status.className = 'status' + (kind ? ' ' + kind : '');
  }

  function setState(next) {
    appState = next;
    stateDot.className = 'state-dot' + (next === S.IDLE ? '' : ' ' + next);
    switch (next) {
      case S.IDLE:
        convBtn.textContent = 'Start conversation';
        convBtn.classList.remove('danger');
        setStatus('Click Start to begin.');
        break;
      case S.LISTENING:
        convBtn.textContent = 'Stop conversation';
        convBtn.classList.add('danger');
        setStatus('Listening — go ahead and talk.', 'ok');
        break;
      case S.PROCESSING:
        convBtn.textContent = 'Stop conversation';
        convBtn.classList.add('danger');
        setStatus('Thinking…');
        break;
      case S.SPEAKING:
        convBtn.textContent = 'Stop conversation';
        convBtn.classList.add('danger');
        setStatus('Speaking — interrupt anytime.', 'ok');
        break;
    }
  }

  function maybeReturnToListening() {
    if (appState === S.IDLE) return;
    if (llmStreaming) return;
    if (audioQueue.length || isPlaying) return;
    if (mode === 'conv') {
      if (appState !== S.LISTENING) setState(S.LISTENING);
    } else {
      // PTT (or stale state): the turn is done, drop back to idle.
      mode = 'idle';
      setState(S.IDLE);
      updateButtonStates();
    }
  }

  function updateButtonStates() {
    pttBtn.disabled = (mode === 'conv');
    convBtn.disabled = (mode === 'ptt');
  }

  function clearBargeInTimer() {
    if (bargeInTimer) { clearTimeout(bargeInTimer); bargeInTimer = null; }
  }

  // ---- selects + discovery ---------------------------------------------

  function fillSelect(sel, items, fallback) {
    sel.innerHTML = '';
    const list = (items && items.length) ? items : (fallback || []);
    if (!list.length) {
      const o = document.createElement('option');
      o.value = ''; o.textContent = '(none available)';
      sel.appendChild(o);
      return;
    }
    list.forEach((v) => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }

  async function loadBackends() {
    try {
      const r = await fetch('/api/llm-backends');
      const data = await r.json();
      const names = (data.backends || []).map((b) => b.name);
      fillSelect(llmBackend, names, []);
      if (data.default) llmBackend.value = data.default;
    } catch (e) {
      fillSelect(llmBackend, [], []);
      setStatus('Could not load backend list: ' + e.message, 'err');
    }
    await loadLLMModels();
  }

  async function loadLLMModels() {
    const url = '/api/llm-models' + (llmBackend.value ? '?backend=' + encodeURIComponent(llmBackend.value) : '');
    try {
      const r = await fetch(url);
      const data = await r.json();
      fillSelect(llmModel, data.models, []);
      if (data.error) setStatus(`LLM unreachable [${data.backend}]: ${data.error}`, 'err');
      else if (!data.models || !data.models.length) setStatus(`No models on ${data.backend}.`, 'err');
      else if (appState === S.IDLE) setStatus(`Ready. ${data.models.length} model(s) on ${data.backend}.`, 'ok');
    } catch (e) {
      fillSelect(llmModel, [], []);
      setStatus('Could not reach LLM: ' + e.message, 'err');
    }
  }

  async function loadVoices() {
    try {
      const r = await fetch('/v1/voices');
      const data = await r.json();
      fillSelect(voiceSel, data.voices, []);
      fillSelect(testVoice, data.voices, []);
      if (data.default) {
        voiceSel.value = data.default;
        testVoice.value = data.default;
      }
    } catch (e) {
      console.error(e);
    }
  }

  // ---- chat rendering --------------------------------------------------

  function addMsg(text, role) {
    const div = document.createElement('div');
    div.classList.add('msg', role);
    if (text) div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function ensureContent(div) {
    let span = div.querySelector('.content');
    if (!span) {
      span = document.createElement('span');
      span.className = 'content';
      div.appendChild(span);
    }
    return span;
  }
  function ensureReasoning(div) {
    let span = div.querySelector('.reasoning');
    if (!span) {
      span = document.createElement('span');
      span.className = 'reasoning';
      span.textContent = 'Thinking: ';
      div.insertBefore(span, div.firstChild);
    }
    return span;
  }

  // ---- audio playback --------------------------------------------------

  function playNext() {
    if (isPlaying || !audioQueue.length) return;
    isPlaying = true;
    const url = audioQueue.shift();
    currentAudio = new Audio(url);
    bargeIneligibleUntil = Date.now() + 200;
    currentAudio.onended = () => {
      isPlaying = false;
      currentAudio = null;
      if (audioQueue.length) playNext();
      else maybeReturnToListening();
    };
    currentAudio.onerror = () => {
      isPlaying = false;
      currentAudio = null;
      playNext();
    };
    currentAudio.play().catch((e) => {
      console.error('audio play err', e);
      isPlaying = false;
      currentAudio = null;
      playNext();
    });
  }

  function stopAudioPlayback() {
    if (currentAudio) {
      try { currentAudio.pause(); } catch (e) { /* ignore */ }
      currentAudio = null;
    }
    audioQueue.length = 0;
    isPlaying = false;
  }

  // ---- WAV encoding ----------------------------------------------------

  function float32ToWav(samples, sampleRate) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const view = new DataView(buf);
    const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + samples.length * 2, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);   // chunk size
    view.setUint16(20, 1, true);    // PCM
    view.setUint16(22, 1, true);    // mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);  // byte rate
    view.setUint16(32, 2, true);    // block align
    view.setUint16(34, 16, true);   // bits/sample
    writeStr(36, 'data');
    view.setUint32(40, samples.length * 2, true);
    let off = 44;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      off += 2;
    }
    return buf;
  }

  function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = '';
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, Math.min(i + chunk, bytes.length)));
    }
    return btoa(binary);
  }

  // ---- VAD callbacks ---------------------------------------------------

  function onVadSpeechStart() {
    if (appState !== S.SPEAKING) return;
    if (Date.now() < bargeIneligibleUntil) return;
    // Don't cancel the assistant on the first frame of detected speech —
    // that's how coughs and speaker bleed end up killing TTS. Wait for
    // sustained speech to confirm it's a real interrupt.
    clearBargeInTimer();
    bargeInTimer = setTimeout(() => {
      bargeInTimer = null;
      if (appState !== S.SPEAKING) return;
      stopAudioPlayback();
      llmStreaming = false;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'cancel' }));
      }
      setState(S.LISTENING);
      setStatus('Listening (interrupting)…', 'ok');
    }, BARGE_IN_HOLD_MS);
  }

  function onVadVADMisfire() {
    // Short blip below minSpeechFrames — never a real utterance.
    clearBargeInTimer();
  }

  function onVadSpeechEnd(audioFloat32) {
    if (appState === S.IDLE) return;
    // Speech ended while assistant is still talking and the 1s confirmation
    // hasn't fired — too short to be a real interrupt. Drop the audio.
    if (appState === S.SPEAKING) {
      clearBargeInTimer();
      return;
    }
    clearBargeInTimer();
    if (!llmModel.value) {
      setStatus('Pick an LLM model first.', 'err');
      return;
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setStatus('Not connected. Reconnecting…', 'err');
      return;
    }
    const wav = float32ToWav(audioFloat32, 16000);
    const b64 = arrayBufferToBase64(wav);
    ws.send(JSON.stringify({
      audio: b64,
      llm_backend: llmBackend.value,
      llm_model: llmModel.value,
      voice: voiceSel.value,
    }));
    setState(S.PROCESSING);
  }

  // ---- VAD init (lazy on first Start click) ----------------------------

  async function initVAD() {
    if (myVAD) return myVAD;
    if (vadLoading) {
      while (vadLoading) await new Promise((r) => setTimeout(r, 50));
      return myVAD;
    }
    vadLoading = true;
    try {
      setStatus('Loading VAD model…');
      myVAD = await vad.MicVAD.new({
        baseAssetPath: 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web/dist/',
        onnxWASMBasePath: 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/',
        additionalAudioConstraints: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
        },
        // Frames are ~96ms each; 12 ≈ 1.15s. Anything shorter is treated as
        // a misfire and never even reaches Whisper.
        minSpeechFrames: 12,
        onSpeechStart: onVadSpeechStart,
        onSpeechEnd: onVadSpeechEnd,
        onVADMisfire: onVadVADMisfire,
      });
    } finally {
      vadLoading = false;
    }
    return myVAD;
  }

  // ---- conversation toggle ---------------------------------------------

  async function toggleConversation() {
    if (mode === 'conv') {
      // STOP
      if (myVAD) myVAD.pause();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'cancel' }));
      }
      stopAudioPlayback();
      llmStreaming = false;
      clearBargeInTimer();
      mode = 'idle';
      setState(S.IDLE);
      updateButtonStates();
      return;
    }
    if (mode === 'ptt') {
      setStatus('Stop push-to-talk first.', 'err');
      return;
    }
    // START
    if (!llmModel.value) {
      setStatus('Pick an LLM model first.', 'err');
      return;
    }
    convBtn.disabled = true;
    try {
      await initVAD();
      myVAD.start();
      mode = 'conv';
      setState(S.LISTENING);
      updateButtonStates();
    } catch (e) {
      console.error('VAD init failed:', e);
      setStatus('VAD failed to start: ' + (e.message || e) + ' (use http://localhost:5000)', 'err');
      convBtn.disabled = false;
    }
  }

  // ---- push-to-talk (toggle) -------------------------------------------

  async function togglePTT() {
    if (mode === 'conv') return;  // button is disabled in this mode
    if (pttRecording) {
      stopPTTRecording();
      return;
    }
    if (!llmModel.value) {
      setStatus('Pick an LLM model first.', 'err');
      return;
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setStatus('Not connected.', 'err');
      return;
    }
    // If a previous PTT turn is still in flight, cancel it before recording.
    if (appState !== S.IDLE) {
      ws.send(JSON.stringify({ type: 'cancel' }));
      stopAudioPlayback();
      llmStreaming = false;
    }
    try {
      await startPTTRecording();
    } catch (e) {
      console.error('PTT start failed:', e);
      setStatus('Mic access failed: ' + (e.message || e), 'err');
    }
  }

  async function startPTTRecording() {
    pttStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    pttChunks = [];
    pttRecorder = new MediaRecorder(pttStream);
    pttRecorder.ondataavailable = (e) => { if (e.data && e.data.size) pttChunks.push(e.data); };
    pttRecorder.onstop = onPTTRecorderStop;
    pttRecorder.start();
    pttRecording = true;
    mode = 'ptt';
    pttBtn.textContent = 'Stop & send';
    pttBtn.classList.remove('ghost');
    pttBtn.classList.add('danger');
    setStatus('Recording — click to send.', 'ok');
    stateDot.className = 'state-dot listening';
    updateButtonStates();
  }

  function stopPTTRecording() {
    if (pttRecorder && pttRecorder.state === 'recording') {
      pttRecorder.stop();  // fires onstop → onPTTRecorderStop
    }
    pttRecording = false;
    pttBtn.textContent = 'Push to talk';
    pttBtn.classList.add('ghost');
    pttBtn.classList.remove('danger');
  }

  function onPTTRecorderStop() {
    const type = (pttChunks[0] && pttChunks[0].type) || 'audio/webm';
    const blob = new Blob(pttChunks, { type });
    if (pttStream) {
      pttStream.getTracks().forEach((t) => t.stop());
      pttStream = null;
    }
    if (!blob.size) {
      setStatus('No audio captured.', 'err');
      mode = 'idle';
      setState(S.IDLE);
      updateButtonStates();
      return;
    }
    blob.arrayBuffer().then((buf) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus('Not connected — recording dropped.', 'err');
        mode = 'idle';
        setState(S.IDLE);
        updateButtonStates();
        return;
      }
      const b64 = arrayBufferToBase64(buf);
      ws.send(JSON.stringify({
        audio: b64,
        llm_backend: llmBackend.value,
        llm_model: llmModel.value,
        voice: voiceSel.value,
      }));
      setState(S.PROCESSING);
    });
  }

  // ---- WebSocket -------------------------------------------------------

  function setupWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      // If we reconnected mid-turn, reset to clean state.
      if (appState !== S.IDLE) {
        if (myVAD) myVAD.pause();
        if (pttRecorder && pttRecorder.state === 'recording') {
          try { pttRecorder.stop(); } catch (e) { /* ignore */ }
        }
        if (pttStream) {
          pttStream.getTracks().forEach((t) => t.stop());
          pttStream = null;
        }
        pttRecording = false;
        pttBtn.textContent = 'Push to talk';
        pttBtn.classList.add('ghost');
        pttBtn.classList.remove('danger');
        stopAudioPlayback();
        llmStreaming = false;
        clearBargeInTimer();
        mode = 'idle';
        setState(S.IDLE);
        updateButtonStates();
      }
    };
    ws.onclose = () => {
      setStatus('Disconnected. Reconnecting…', 'err');
      setTimeout(setupWS, 2000);
    };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      switch (data.type) {
        case 'transcription':
          addMsg(data.text, 'user');
          if (data.text !== '(no speech detected)') {
            currentAssistantMsg = addMsg('', 'assistant');
            llmStreaming = true;
          }
          break;
        case 'llm_chunk':
          if (!currentAssistantMsg) currentAssistantMsg = addMsg('', 'assistant');
          if (data.is_reasoning) {
            ensureReasoning(currentAssistantMsg).textContent += data.text;
          } else {
            ensureContent(currentAssistantMsg).textContent += data.text;
          }
          chat.scrollTop = chat.scrollHeight;
          break;
        case 'tts_audio':
          audioQueue.push(`data:audio/wav;base64,${data.audio}`);
          if (appState === S.PROCESSING) setState(S.SPEAKING);
          playNext();
          break;
        case 'llm_done':
          llmStreaming = false;
          currentAssistantMsg = null;
          maybeReturnToListening();
          break;
        case 'cancelled':
          // Server confirmed it killed the in-flight pipeline. The new
          // user audio is already queued or will be sent shortly.
          llmStreaming = false;
          currentAssistantMsg = null;
          break;
        case 'reset_ack':
          chat.innerHTML = '';
          if (appState === S.IDLE) setStatus('Chat reset.', 'ok');
          break;
        case 'error':
          setStatus('Error: ' + data.message, 'err');
          llmStreaming = false;
          maybeReturnToListening();
          break;
      }
    };
  }

  // ---- TTS test panel (unchanged behavior) -----------------------------

  async function testTTS() {
    const text = testText.value.trim();
    if (!text) { testStatus.textContent = 'Type something first.'; return; }
    testBtn.disabled = true;
    testStatus.textContent = 'Synthesizing…';
    const t0 = performance.now();
    try {
      const r = await fetch('/v1/audio/speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: text,
          voice: testVoice.value,
          speed: parseFloat(testSpeed.value) || 1.0,
        }),
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error(`${r.status}: ${txt}`);
      }
      const blob = await r.blob();
      const ms = Math.round(performance.now() - t0);
      testStatus.textContent = `Got ${blob.size} bytes in ${ms}ms`;
      const url = URL.createObjectURL(blob);
      const a = new Audio(url);
      a.onended = () => URL.revokeObjectURL(url);
      a.play();
    } catch (e) {
      testStatus.textContent = 'Error: ' + e.message;
    } finally {
      testBtn.disabled = false;
    }
  }

  // ---- reset chat ------------------------------------------------------

  function reset() {
    if (myVAD) myVAD.pause();
    if (pttRecorder && pttRecorder.state === 'recording') {
      try { pttRecorder.stop(); } catch (e) { /* ignore */ }
    }
    if (pttStream) {
      pttStream.getTracks().forEach((t) => t.stop());
      pttStream = null;
    }
    pttRecording = false;
    pttBtn.textContent = 'Push to talk';
    pttBtn.classList.add('ghost');
    pttBtn.classList.remove('danger');
    stopAudioPlayback();
    llmStreaming = false;
    clearBargeInTimer();
    mode = 'idle';
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reset' }));
    } else {
      chat.innerHTML = '';
    }
    setState(S.IDLE);
    updateButtonStates();
  }

  // ---- init ------------------------------------------------------------

  convBtn.addEventListener('click', toggleConversation);
  pttBtn.addEventListener('click', togglePTT);
  resetBtn.addEventListener('click', reset);
  testBtn.addEventListener('click', testTTS);
  llmBackend.addEventListener('change', loadLLMModels);

  setState(S.IDLE);
  updateButtonStates();
  loadBackends();
  loadVoices();
  setupWS();
</script>
