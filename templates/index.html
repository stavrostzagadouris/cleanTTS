<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cleanTTS</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f232c;
      --text: #e8eaed;
      --muted: #8a93a3;
      --accent: #5ea1ff;
      --accent-strong: #2f7bff;
      --danger: #e0485f;
      --user: #2f7bff;
      --assistant: #2a2f3a;
      --ok: #4ec9b0;
      --border: #2a2f3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .app {
      width: 100%;
      max-width: 760px;
      display: grid;
      gap: 16px;
    }
    h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: 0.2px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 8px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }

    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    select, input[type=text], input[type=number], button, textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
    }
    textarea { font-family: inherit; resize: vertical; }
    button {
      cursor: pointer;
      background: var(--accent-strong);
      color: white;
      border: none;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.ghost { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    button.danger { background: var(--danger); }

    .chat {
      height: 320px;
      overflow-y: auto;
      padding: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .msg {
      max-width: 85%;
      padding: 9px 13px;
      border-radius: 14px;
      line-height: 1.4;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user { background: var(--user); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.assistant { background: var(--assistant); align-self: flex-start; border-bottom-left-radius: 4px; }
    .reasoning { color: var(--muted); font-style: italic; font-size: 12px; display: block; margin-bottom: 6px; }

    .mic-row { display: flex; align-items: center; gap: 12px; }
    .mic {
      width: 64px; height: 64px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; background: var(--danger); flex-shrink: 0;
    }
    .mic.recording { animation: pulse 1.4s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(224, 72, 95, 0.7); }
      70% { box-shadow: 0 0 0 18px rgba(224, 72, 95, 0); }
      100% { box-shadow: 0 0 0 0 rgba(224, 72, 95, 0); }
    }
    .status { color: var(--muted); font-size: 13px; }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }

    h2 { margin: 0 0 8px; font-size: 16px; }
    .test-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }

    code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>cleanTTS</h1>
      <div class="sub">Local voice assistant — Whisper + Kokoro + remote LLM. External tools can call <code>POST /v1/audio/speech</code>.</div>
    </header>

    <section class="panel">
      <div class="row" style="margin-bottom: 12px;">
        <div>
          <label for="llm-backend">LLM server</label>
          <select id="llm-backend"><option>Loading…</option></select>
        </div>
        <div>
          <label for="llm-model">LLM model</label>
          <select id="llm-model"><option>Loading…</option></select>
        </div>
      </div>

      <div class="row" style="grid-template-columns: 1fr; margin-bottom: 12px;">
        <div>
          <label for="voice">Voice</label>
          <select id="voice"><option>Loading…</option></select>
        </div>
      </div>

      <div class="chat" id="chat"></div>

      <div class="mic-row" style="margin-top: 12px;">
        <button id="mic" class="mic" title="Hold or click to talk">🎤</button>
        <div style="flex: 1;">
          <div id="status" class="status">Ready. Click the mic to talk.</div>
        </div>
        <button id="reset" class="ghost" style="width: auto;">New chat</button>
      </div>
    </section>

    <section class="panel">
      <h2>Test TTS API</h2>
      <div class="sub">Same endpoint your external tools should hit: <code>POST /v1/audio/speech</code></div>
      <div class="row" style="margin-bottom: 10px;">
        <div>
          <label for="test-voice">Voice</label>
          <select id="test-voice"><option>Loading…</option></select>
        </div>
        <div>
          <label for="test-speed">Speed</label>
          <input id="test-speed" type="number" step="0.1" min="0.25" max="4.0" value="1.0" />
        </div>
      </div>
      <div class="test-row">
        <textarea id="test-text" rows="2" placeholder="Type something to speak…">Third place, two seconds behind the leader. Keep pushing.</textarea>
        <button id="test-speak" style="width: auto; align-self: stretch;">Speak</button>
      </div>
      <div id="test-status" class="status" style="margin-top: 8px;"></div>
    </section>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const chat = $('chat');
  const status = $('status');
  const llmBackend = $('llm-backend');
  const llmModel = $('llm-model');
  const voiceSel = $('voice');
  const testVoice = $('test-voice');
  const micBtn = $('mic');
  const resetBtn = $('reset');
  const testBtn = $('test-speak');
  const testText = $('test-text');
  const testSpeed = $('test-speed');
  const testStatus = $('test-status');

  let ws;
  let mediaRecorder;
  let audioChunks = [];
  let recording = false;
  let currentAssistantMsg = null;

  // Audio playback queue (so consecutive TTS chunks play in order)
  const audioQueue = [];
  let isPlaying = false;

  function setStatus(text, kind = '') {
    status.textContent = text;
    status.className = 'status' + (kind ? ' ' + kind : '');
  }

  function fillSelect(sel, items, fallback) {
    sel.innerHTML = '';
    const list = (items && items.length) ? items : (fallback || []);
    if (!list.length) {
      const o = document.createElement('option');
      o.value = ''; o.textContent = '(none available)';
      sel.appendChild(o);
      return;
    }
    list.forEach((v) => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v;
      sel.appendChild(o);
    });
  }

  async function loadBackends() {
    try {
      const r = await fetch('/api/llm-backends');
      const data = await r.json();
      const names = (data.backends || []).map((b) => b.name);
      fillSelect(llmBackend, names, []);
      if (data.default) llmBackend.value = data.default;
    } catch (e) {
      fillSelect(llmBackend, [], []);
      setStatus('Could not load backend list: ' + e.message, 'err');
    }
    await loadLLMModels();
  }

  async function loadLLMModels() {
    const url = '/api/llm-models' + (llmBackend.value ? '?backend=' + encodeURIComponent(llmBackend.value) : '');
    try {
      const r = await fetch(url);
      const data = await r.json();
      fillSelect(llmModel, data.models, []);
      const tag = data.backend ? ` [${data.backend}]` : '';
      if (data.error) setStatus(`LLM unreachable${tag}: ${data.error}`, 'err');
      else if (!data.models || !data.models.length) setStatus(`No models on ${data.backend}.`, 'err');
      else setStatus(`Ready. ${data.models.length} model(s) on ${data.backend}.`, 'ok');
    } catch (e) {
      fillSelect(llmModel, [], []);
      setStatus('Could not reach LLM: ' + e.message, 'err');
    }
  }

  async function loadVoices() {
    try {
      const r = await fetch('/v1/voices');
      const data = await r.json();
      fillSelect(voiceSel, data.voices, []);
      fillSelect(testVoice, data.voices, []);
      if (data.default) {
        voiceSel.value = data.default;
        testVoice.value = data.default;
      }
    } catch (e) {
      console.error(e);
    }
  }

  function addMsg(text, role) {
    const div = document.createElement('div');
    div.classList.add('msg', role);
    if (text) div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function ensureContent(div) {
    let span = div.querySelector('.content');
    if (!span) {
      span = document.createElement('span');
      span.className = 'content';
      div.appendChild(span);
    }
    return span;
  }
  function ensureReasoning(div) {
    let span = div.querySelector('.reasoning');
    if (!span) {
      span = document.createElement('span');
      span.className = 'reasoning';
      span.textContent = 'Thinking: ';
      div.insertBefore(span, div.firstChild);
    }
    return span;
  }

  function playNext() {
    if (isPlaying || !audioQueue.length) return;
    isPlaying = true;
    const url = audioQueue.shift();
    const a = new Audio(url);
    a.onended = () => { isPlaying = false; playNext(); };
    a.onerror = () => { isPlaying = false; playNext(); };
    a.play().catch((e) => { console.error('play err', e); isPlaying = false; playNext(); });
  }

  function setupWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => setStatus('Ready. Click the mic to talk.', 'ok');
    ws.onclose = () => {
      setStatus('Disconnected. Reconnecting…', 'err');
      setTimeout(setupWS, 2000);
    };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      switch (data.type) {
        case 'transcription':
          addMsg(data.text, 'user');
          setStatus('Generating response…');
          currentAssistantMsg = addMsg('', 'assistant');
          break;
        case 'llm_chunk':
          if (!currentAssistantMsg) currentAssistantMsg = addMsg('', 'assistant');
          if (data.is_reasoning) {
            ensureReasoning(currentAssistantMsg).textContent += data.text;
          } else {
            ensureContent(currentAssistantMsg).textContent += data.text;
          }
          chat.scrollTop = chat.scrollHeight;
          break;
        case 'tts_audio':
          audioQueue.push(`data:audio/wav;base64,${data.audio}`);
          playNext();
          break;
        case 'llm_done':
          setStatus('Done. Click the mic again.', 'ok');
          currentAssistantMsg = null;
          break;
        case 'reset_ack':
          chat.innerHTML = '';
          setStatus('Chat reset.', 'ok');
          break;
        case 'error':
          setStatus('Error: ' + data.message, 'err');
          break;
      }
    };
  }

  async function toggleRecording() {
    if (!llmModel.value) {
      setStatus('Pick an LLM model first.', 'err');
      return;
    }
    if (recording) {
      mediaRecorder.stop();
      recording = false;
      micBtn.classList.remove('recording');
      setStatus('Transcribing…');
      return;
    }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (ev) => audioChunks.push(ev.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const fr = new FileReader();
        fr.readAsDataURL(blob);
        fr.onloadend = () => {
          const b64 = fr.result.split(',')[1];
          ws.send(JSON.stringify({
            audio: b64,
            llm_backend: llmBackend.value,
            llm_model: llmModel.value,
            voice: voiceSel.value,
          }));
        };
        stream.getTracks().forEach((t) => t.stop());
      };
      mediaRecorder.start();
      recording = true;
      micBtn.classList.add('recording');
      setStatus('Listening… click again to stop.');
    } catch (e) {
      setStatus('Mic error: ' + e.message + ' (use http://localhost:5000)', 'err');
    }
  }

  async function testTTS() {
    const text = testText.value.trim();
    if (!text) { testStatus.textContent = 'Type something first.'; return; }
    testBtn.disabled = true;
    testStatus.textContent = 'Synthesizing…';
    const t0 = performance.now();
    try {
      const r = await fetch('/v1/audio/speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: text,
          voice: testVoice.value,
          speed: parseFloat(testSpeed.value) || 1.0,
        }),
      });
      if (!r.ok) {
        const txt = await r.text();
        throw new Error(`${r.status}: ${txt}`);
      }
      const blob = await r.blob();
      const ms = Math.round(performance.now() - t0);
      testStatus.textContent = `Got ${blob.size} bytes in ${ms}ms`;
      const url = URL.createObjectURL(blob);
      const a = new Audio(url);
      a.onended = () => URL.revokeObjectURL(url);
      a.play();
    } catch (e) {
      testStatus.textContent = 'Error: ' + e.message;
    } finally {
      testBtn.disabled = false;
    }
  }

  function reset() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'reset' }));
    } else {
      chat.innerHTML = '';
    }
  }

  micBtn.addEventListener('click', toggleRecording);
  resetBtn.addEventListener('click', reset);
  testBtn.addEventListener('click', testTTS);
  llmBackend.addEventListener('change', loadLLMModels);

  loadBackends();
  loadVoices();
  setupWS();
</script>
</body>
</html>
